name: Main

on:
  push:
  schedule:
    # * is a special character in YAML so you have to quote this string
    # Run on the 7th of each month at 13:37 to ensure the image stays up-to-date
    - cron:  '37 13 7 * *'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build container image
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: true
      matrix:
        mpi: [mpich, openmpi]
        type: [full, mini]
        config:
          - name: "With openmp"
            openmp: 1
            prefix: "openmp-"
          - name: "Without openmp"
            openmp: 0
            prefix: ""
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to the Container registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            prefix=${{ matrix.mpi }}-${{ matrix.config.prefix }}${{ matrix.type }}-

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          build-args: |
            MPI=${{ matrix.mpi }}
            TYPE=${{ matrix.type }}
            OPENMP=${{ matrix.config.openmp }}
          context: main/
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
